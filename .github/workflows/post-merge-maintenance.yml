name: post-merge-maintenance

# Event-sourced bookkeeping (v0.3 Phase 1). When a PR merges, record it automatically
# so the trust ledger / CHANGELOG / VERSION can never decay from missed manual appends.
# Opens a bookkeeping PR (does NOT push to a protected branch → no PAT needed).
#
# Security: uses pull_request_target (write token) but NEVER checks out or runs PR head
# code — only the trusted base branch. PR-controlled strings (title) are passed via env
# vars, never interpolated into a run: script, to avoid Actions expression injection.

on:
  pull_request_target:
    types: [closed]
    branches: [v2, main]

permissions:
  contents: write
  pull-requests: write

jobs:
  bookkeep:
    name: record merged PR
    # Only on a real merge, and never on a bookkeeping PR itself (loop guard).
    if: >
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'chore/bookkeeping-')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
    steps:
      - name: Check out the base branch (trusted; never the PR head)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Gather changed files (metadata only)
        run: |
          # PR title/number/sha come from env (injection-safe). Changed files via gh.
          gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > /tmp/changed-files.txt
          echo "changed $(wc -l < /tmp/changed-files.txt) files"

      - name: Run bookkeeping
        id: book
        run: |
          bash scripts/bookkeeping.sh \
            --pr "$PR_NUMBER" \
            --title "$PR_TITLE" \
            --sha "$MERGE_SHA" \
            --files "$(cat /tmp/changed-files.txt)" \
            --date "$(date +%F)"
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "bookkeeping made no changes (already recorded) — skipping PR"
          fi

      - name: Open the bookkeeping PR
        if: steps.book.outputs.changed == 'true'
        run: |
          branch="chore/bookkeeping-${PR_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add VERSION CHANGELOG.md docs/harness-experimental/trust-metrics.md
          git commit -m "chore(bookkeeping): record PR #${PR_NUMBER}"
          git push origin "$branch"
          gh pr create \
            --base "$BASE_REF" \
            --head "$branch" \
            --title "chore(bookkeeping): record PR #${PR_NUMBER}" \
            --body "Automated post-merge bookkeeping for #${PR_NUMBER}: trust-metrics row, CHANGELOG entry, VERSION bump. Generated by post-merge-maintenance.yml."
