name: post-merge-maintenance

# Event-sourced bookkeeping (v0.3 Phase 1). When a PR merges, record it automatically
# so the trust ledger / CHANGELOG / VERSION can never decay from missed manual appends.
# Opens a bookkeeping PR (does NOT push to a protected branch → no PAT needed).
#
# Security: uses pull_request_target (write token) but NEVER checks out or runs PR head
# code — only the trusted base branch. PR-controlled strings (title) are passed via env
# vars, never interpolated into a run: script, to avoid Actions expression injection.

on:
  pull_request_target:
    types: [closed]
    # THIS FILE MUST BE SYNCED ON `main`: pull_request_target always loads the workflow
    # definition from the repo's real DEFAULT branch (main), regardless of the PR's base.
    # Editing this list only on an integration branch has NO effect (observed 2026-07-04,
    # docs/harness-v03-plan-overview.md; same pattern as PRs #36/#44/#45 — sync to main
    # in its own small PR).
    #
    # Keep the list to the branch(es) PRs are actually merged into. IT ROTS SILENTLY: a PR
    # merged into a branch missing here fires nothing — no run, no log, no error.
    # History: [v2] while v2 was the working branch (main then lacked
    # scripts/bookkeeping.sh — PR #44 crashed on that gap; PR #36 added it to main only to
    # register pull_request_target). After the v2 → main promotion the stale [v2] silently
    # skipped PRs #66/#68/#69/#70 (2026-07-16 over-engineering review, C3). Then [main, v3]
    # outlived v3 — no longer on the remote — and silently skipped PRs #158 and #160,
    # merged into `loop` (2026-07-23).
    branches: [main, loop]  # loop = integration/staging branch (2026-07-23); PRs merge here first

permissions:
  contents: write
  pull-requests: write

jobs:
  bookkeep:
    name: record merged PR
    # Only on a real merge, and never on a bookkeeping PR itself (loop guard).
    if: >
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.head.ref, 'chore/bookkeeping-')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
    steps:
      - name: Check out the base branch (trusted; never the PR head)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Gather changed files (metadata only)
        run: |
          # PR title/number/sha come from env (injection-safe). Changed files via gh.
          gh pr view "$PR_NUMBER" --json files --jq '.files[].path' > /tmp/changed-files.txt
          echo "changed $(wc -l < /tmp/changed-files.txt) files"

      - name: Run bookkeeping
        id: book
        run: |
          bash scripts/bookkeeping.sh \
            --pr "$PR_NUMBER" \
            --title "$PR_TITLE" \
            --sha "$MERGE_SHA" \
            --files "$(cat /tmp/changed-files.txt)" \
            --date "$(date +%F)"
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "bookkeeping made no changes (already recorded) — skipping PR"
          fi

      - name: Run-state checkpoint — mark shipped (non-fatal, Phase C)
        run: |
          slug=$(grep -oE 'specs/[^/]+/SUMMARY\.md' /tmp/changed-files.txt | head -1 | cut -d/ -f2 || true)
          if [ -z "$slug" ]; then
            echo "no specs/<slug>/SUMMARY.md in this PR — skipping run-state transition"
          elif [ ! -f "specs/$slug/RUN.json" ]; then
            echo "no RUN.json for $slug — skipping run-state transition"
          else
            python3 runtime/run_state.py transition --slug "$slug" --to shipped \
              --event ci.merged --sha "$MERGE_SHA" \
              || echo "::warning::run-state transition to shipped failed/skipped for $slug"
          fi

      - name: Open the bookkeeping PR
        if: steps.book.outputs.changed == 'true'
        run: |
          branch="chore/bookkeeping-${PR_NUMBER}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add VERSION CHANGELOG.md docs/harness-experimental/trust-metrics.md docs/harness-experimental/audit-log.jsonl
          git commit -m "chore(bookkeeping): record PR #${PR_NUMBER}"
          git push origin "$branch"
          gh pr create \
            --base "$BASE_REF" \
            --head "$branch" \
            --title "chore(bookkeeping): record PR #${PR_NUMBER}" \
            --body "Automated post-merge bookkeeping for #${PR_NUMBER}: trust-metrics row, CHANGELOG entry, VERSION bump. Generated by post-merge-maintenance.yml."
