name: harness-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # The hooks are bash developed on macOS and run on contributors' Linux machines —
      # the BSD/GNU split is exactly what this matrix exists to catch.
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      # scripts/lint-skill-bash.sh degrades to syntax-only when shellcheck is missing, so the
      # suite passes either way — but CI is where the shellcheck pass must actually run, or the
      # gate is only as strong as whatever each contributor happens to have installed.
      # ubuntu-latest ships it; macos-latest does not.
      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck
      - name: Run harness test suite
        run: bash scripts/run-tests.sh

  # Strict-in-CI gate: a PR diff that touches hard-gate paths must carry a
  # high-risk SUMMARY with machine-verified proof. Separate job (not a step in
  # `test`) because it needs full history (fetch-depth: 0) to diff against the
  # base branch. Local commit hooks keep their warn-default; CI is the strict gate.
  strict-gate:
    name: strict-gate (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base ref
        run: git fetch --no-tags origin "${{ github.base_ref }}"
      # ci-strict-gate.sh re-runs each changed high-risk SUMMARY's `### Verify`
      # rows for machine-verified proof. Those commands can be the project's test
      # runner (e.g. `python3 -m pytest ...` for an SC-coverage row), so the gate
      # job must have pytest on the same `python3` — the `test` job relies on
      # ambient pytest, which is not guaranteed here. Provision it deterministically.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install proof runner (pytest)
        run: python -m pip install --quiet pytest
      - name: Strict gate (hard-gate paths require high-risk SUMMARY + verified proof)
        run: bash scripts/ci-strict-gate.sh "origin/${{ github.base_ref }}"
