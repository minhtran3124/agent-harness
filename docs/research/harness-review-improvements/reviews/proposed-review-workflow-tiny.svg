<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" role="img" aria-labelledby="title desc" font-family="system-ui, sans-serif" font-size="14" fill="#0f172a">
  <title id="title">Tiny lane review workflow</title>
  <desc id="desc">Tiny changes use deterministic checks without a default LLM review. Ambiguity or hard-gate signals leave the tiny lane. Evidence is pinned to the current HEAD before opening a pull request.</desc>
  <defs>
    <style>
      .title { font: 600 30px system-ui, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px system-ui, sans-serif; fill: #475569; }
      .label { font: 500 15px system-ui, sans-serif; fill: #0f172a; }
      .body { font: 400 14px system-ui, sans-serif; fill: #0f172a; }
      .small { font: 400 13px system-ui, sans-serif; fill: #475569; }
      .node { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; }
      .state { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.8; }
      .decision { fill: #fff7ed; stroke: #f97316; stroke-width: 1.8; }
      .persist { fill: #f5f3ff; stroke: #8b5cf6; stroke-width: 1.8; }
      .success { fill: #ecfdf5; stroke: #10b981; stroke-width: 1.8; }
      .danger { fill: #fef2f2; stroke: #ef4444; stroke-width: 1.8; }
      .edge { fill: none; stroke: #475569; stroke-width: 1.8; marker-end: url(#arrow); }
      .return { fill: none; stroke: #2563eb; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrowBlue); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#475569"/></marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1200" height="980" fill="#ffffff"/>
  <text x="60" y="65" class="title" font-size="30" font-weight="600" fill="#0f172a">Tiny lane</text>
  <text x="60" y="100" class="subtitle" font-size="17" font-weight="400" fill="#475569">Mục tiêu: proof nhanh, deterministic; không có LLM review mặc định.</text>

  <rect x="60" y="132" width="510" height="62" rx="10" class="state" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="84" y="158" class="small">ENTRY CONTRACT</text>
  <text x="84" y="181" class="body">≤1 file · no public callable · no hard gate · intent rõ</text>
  <rect x="600" y="132" width="540" height="62" rx="10" class="node" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="624" y="158" class="small">DEFAULT COST</text>
  <text x="624" y="181" class="body">0 reviewer agents · hooks/tests only</text>

  <rect x="390" y="235" width="420" height="78" rx="10" class="state" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8"/>
  <text x="600" y="267" text-anchor="middle" class="label">Feature intake</text>
  <text x="600" y="292" text-anchor="middle" class="small">Capture verbatim intent · Lane=tiny · Confidence</text>

  <polygon points="600,350 755,405 600,460 445,405" class="decision" fill="#fff7ed" stroke="#f97316" stroke-width="1.8"/>
  <text x="600" y="398" text-anchor="middle" class="label">Still tiny?</text>
  <text x="600" y="424" text-anchor="middle" class="small">No ambiguity or hard-gate signal</text>
  <path d="M600 313V350" class="edge" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="815" y="365" width="315" height="80" rx="10" class="danger" fill="#fef2f2" stroke="#ef4444" stroke-width="1.8"/>
  <text x="972" y="397" text-anchor="middle" class="label">Leave tiny lane</text>
  <text x="972" y="423" text-anchor="middle" class="small">Reclassify normal/high-risk</text>
  <path d="M755 405H815" class="edge" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="782" y="389" text-anchor="middle" class="small">NO</text>

  <rect x="390" y="505" width="420" height="92" rx="10" class="node" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="600" y="538" text-anchor="middle" class="label">Direct implementation</text>
  <text x="600" y="568" text-anchor="middle" class="body">Dedicated branch · scoped edit</text>
  <path d="M600 460V505" class="edge" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="621" y="485" class="small">YES</text>

  <rect x="390" y="642" width="420" height="112" rx="10" class="success" fill="#ecfdf5" stroke="#10b981" stroke-width="1.8"/>
  <text x="600" y="676" text-anchor="middle" class="label">Deterministic proof</text>
  <text x="600" y="706" text-anchor="middle" class="body">Focused tests · lint · existing hooks</text>
  <text x="600" y="733" text-anchor="middle" class="small">Record command, exit code, touched files</text>
  <path d="M600 597V642" class="edge" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="390" y="800" width="420" height="86" rx="20" class="persist" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.8"/>
  <text x="600" y="832" text-anchor="middle" class="label">Verification receipt</text>
  <text x="600" y="860" text-anchor="middle" class="body">verified_head_sha = current HEAD</text>
  <path d="M600 754V800" class="edge" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <polygon points="600,908 700,943 600,978 500,943" class="decision" fill="#fff7ed" stroke="#f97316" stroke-width="1.8"/>
  <text x="600" y="938" text-anchor="middle" class="label">HEAD changed?</text>
  <text x="600" y="960" text-anchor="middle" class="small">No → open PR</text>
  <path d="M600 886V908" class="edge" fill="none" stroke="#475569" stroke-width="1.8" marker-end="url(#arrow)"/>

  <path d="M500 943H310V698H390" class="return" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrowBlue)"/>
  <text x="292" y="820" text-anchor="end" class="small">YES · rerun proof</text>
</svg>
